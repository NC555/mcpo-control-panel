services:
  mcpo-control-panel:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
      - "8001:8000"
    volumes:
      - ./data:/data
    environment:
      MCPO_MANAGER_HOST: "0.0.0.0"
      MCPO_MANAGER_PORT: "8083"
      MCPO_MANAGER_DATA_DIR: "/data"
    restart: unless-stopped
    networks:
      - coolify
      - psswwcsw8sk8ws8s844os08o

networks:
  coolify:
    external: true
  psswwcsw8sk8ws8s844os08o:
    external: true
